<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login - USLS GS Monitoring MVP</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<main style="max-width:520px; padding-top:60px;">
  <div class="card">
    <h2 style="margin:0 0 8px 0;">USLS Graduate School Monitoring MVP</h2>
    <small>Role-based prototype for lifecycle monitoring and decision support.</small>
    <div style="height:14px;"></div>
    <div class="formrow">
      <div>
        <label>Email</label>
        <input placeholder="name@usls.edu.ph"/>
      </div>
      <div>
        <label>Role</label>
        <select>
          <option>Graduate School Staff</option>
          <option>Academic Coordinator</option>
          <option>Research Coordinator</option>
          <option>Adviser/Panel</option>
          <option>Student</option>
        </select>
      </div>
    </div>
    <div style="height:12px;"></div>
    <a class="btn primary" href="dashboard.html">Enter prototype</a>
  </div>
</main>
</body>
</html>
