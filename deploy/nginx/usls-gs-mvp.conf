# Nginx vhost for USLS GS MVP
# Place at: /etc/nginx/sites-available/usls-gs-mvp.conf
# Enable with symlink to /etc/nginx/sites-enabled/usls-gs-mvp.conf

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.example;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.example;

    # Cloudflare Origin Certificate (recommended with Cloudflare proxy + Full (strict))
    ssl_certificate /etc/ssl/certs/usls-origin.crt;
    ssl_certificate_key /etc/ssl/private/usls-origin.key;

    # Uncomment if you maintain shared SSL params
    # include /etc/nginx/snippets/ssl-params.conf;

    root /opt/usls-gs-mvp/client/dist;
    index index.html;

    client_max_body_size 25m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint from backend
    location = /health {
        proxy_pass http://127.0.0.1:4000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploads must stay behind API authorization
    location /uploads/ {
        return 404;
    }

    # React SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
